# Map the Upgrade header to the correct Connection value.
# WebSocket requests  → Connection: upgrade
# Regular HTTP/polling → Connection: keep-alive
# Hardcoding "upgrade" on all requests sends malformed HTTP for polling traffic.
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       keep-alive;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (images, SVGs) — matches Express 50mb limit
    client_max_body_size 50m;

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend server
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Proxy Socket.IO — supports both WebSocket and HTTP long-polling
    location /socket.io/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering — critical for real-time events via polling transport
        proxy_buffering off;
        proxy_cache     off;

        # Keep the connection alive for long socket sessions
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
